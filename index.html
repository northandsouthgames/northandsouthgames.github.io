<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>North &amp; South Games</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --text: #e8edf4;
      --muted: #9aa8bc;
      --accent: #f0c040;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      padding: 2rem;
    }
    h1 { color: var(--accent); margin-bottom: 0.5rem; }
    p { color: var(--muted); }
    ul { list-style: none; padding: 0; margin-top: 2rem; }
    li { margin: 0.75rem 0; }
    a { color: var(--accent); text-decoration: none; font-size: 1.1rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div>
    <h1>North &amp; South Games</h1>
    <p>Tap Dig Mine — legal documents</p>
    <ul>
      <li><a href="tapdigmine/privacy/">Privacy Policy</a></li>
      <li><a href="tapdigmine/terms/">Terms of Service</a></li>
    </ul>
  </div>
</body>
</html>
